<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d0d0d;
      color: #e2e2e2;
      font-size: 14px;
      line-height: 1.7;
      padding: 40px 16px;
    }

    .wrapper {
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── Top accent line ── */
    .accent { height: 2px; background: {{COLOR}}; margin-bottom: 32px; }

    /* ── Header ── */
    .header { margin-bottom: 32px; }
    .header .org {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .header .meta {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot { color: #333; }

    /* ── Severity pill ── */
    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .pill-critical { background: #3b0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .pill-warning  { background: #2d1a00; color: #fbbf24; border: 1px solid #78350f; }
    .pill-watching { background: #0c1a2e; color: #60a5fa; border: 1px solid #1e3a5f; }
    .pill-clean    { background: #052e16; color: #4ade80; border: 1px solid #14532d; }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid #1e1e1e;
      margin: 28px 0;
    }

    /* ── Body content ── */
    .body-content { color: #c8c8c8; }

    h2 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #444;
      margin: 32px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1a1a1a;
    }
    h2:first-child { margin-top: 0; }

    h3 {
      font-size: 14px;
      font-weight: 600;
      color: #e2e2e2;
      margin: 20px 0 6px;
    }

    p { margin: 6px 0; color: #aaa; }

    ul, ol { padding-left: 18px; margin: 8px 0; }
    li { color: #aaa; margin-bottom: 4px; }
    li strong { color: #e2e2e2; }

    /* ── Inline code ── */
    code {
      background: #1a1a1a;
      color: #a78bfa;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 12px;
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* ── Code block ── */
    pre {
      background: #111;
      border-left: 2px solid #333;
      padding: 12px 16px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 10px 0;
      color: #aaa;
      border-radius: 0 4px 4px 0;
    }

    /* ── Tables ── */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 13px;
    }
    thead tr { border-bottom: 1px solid #2a2a2a; }
    th {
      padding: 8px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
    }
    td {
      padding: 9px 12px;
      border-bottom: 1px solid #161616;
      color: #bbb;
    }
    tbody tr:hover td { background: #111; }
    td strong { color: #e2e2e2; }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-left {
      font-size: 11px;
      color: #333;
    }
    .footer-right {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    strong { color: #e2e2e2; }
    b { color: #e2e2e2; }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="accent"></div>

    <div class="header">
      <div class="org">Lipila Payment Gateway</div>
      <h1>{{SUBJECT}}</h1>
      <div class="meta">
        <span>{{TIMESTAMP}}</span>
        <span class="dot">·</span>
        <span class="pill pill-{{SEVERITY}}">{{SEVERITY}}</span>
      </div>
    </div>

    <hr>

    <div class="body-content">
      {{BODY}}
    </div>

    <div class="footer">
      <div class="footer-left">Automated report &nbsp;·&nbsp; Do not reply</div>
      <div class="footer-right">Fraud Detector</div>
    </div>

  </div>
</body>
</html>

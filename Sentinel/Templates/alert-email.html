<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{{SUBJECT}}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      color: #18181b;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-text-size-adjust: 100%;
    }
    table { border-collapse: collapse; mso-table-lspace: 0; mso-table-rspace: 0; }
    img   { border: 0; display: block; }

    .outer      { width: 100%; background-color: #f4f4f5; padding: 32px 16px; }

    .inner {
      margin: 0 auto;
    }
    .topbar     { height: 3px; background-color: {{COLOR}}; border-radius: 2px; margin-bottom: 28px; }

    .header-org   { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #a1a1aa; margin-bottom: 6px; }
    .header-title { font-size: 20px; font-weight: 600; color: #18181b; margin: 0 0 10px; line-height: 1.3; }
    .header-meta  { font-size: 12px; color: #a1a1aa; }
    .header-meta .sep { margin: 0 8px; color: #d4d4d8; }

    .badge { display: inline-block; padding: 2px 9px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; vertical-align: middle; }
    .badge-critical { background-color: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    .badge-warning  { background-color: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
    .badge-watching { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #93c5fd; }
    .badge-clean    { background-color: #f0fdf4; color: #166534; border: 1px solid #86efac; }

    .rule { border: none; border-top: 1px solid #e4e4e7; margin: 24px 0; }

    h2 { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #a1a1aa; margin: 28px 0 10px; padding-bottom: 8px; border-bottom: 1px solid #e4e4e7; }
    h3 { font-size: 14px; font-weight: 600; color: #18181b; margin: 18px 0 5px; }
    p  { margin: 6px 0; color: #52525b; }
    a  { color: #059669; text-decoration: none; }
    ul, ol { margin: 8px 0; padding-left: 20px; }
    li { color: #52525b; margin-bottom: 3px; }
    strong, b { color: #18181b; }

    code { font-family: 'SF Mono','Fira Code','Courier New',monospace; font-size: 12px; background-color: #e4e4e7; color: #7c3aed; padding: 1px 5px; border-radius: 3px; }
    pre  { font-family: 'SF Mono','Fira Code','Courier New',monospace; font-size: 12px; background-color: #e4e4e7; color: #52525b; border-left: 2px solid #d4d4d8; padding: 12px 14px; margin: 10px 0; white-space: pre-wrap; word-break: break-all; border-radius: 0 3px 3px 0; }

    blockquote { margin: 16px 0; padding: 10px 14px; border-left: 3px solid #d4d4d8; background-color: #ebebec; border-radius: 0 3px 3px 0; }
    blockquote p { margin: 0; color: #71717a; font-size: 13px; font-style: italic; }

    .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 10px 0;
    }

    table.data {
        width: 100%;
        min-width: 480px;
        font-size: 13px;
        border-collapse: collapse;
    }

    table.data th {
        padding: 7px 12px;
        text-align: left;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #a1a1aa;
        border-bottom: 1px solid #e4e4e7;
        white-space: nowrap;
    }
    table.data td { padding: 8px 12px; color: #52525b; border-bottom: 1px solid #f4f4f5; }
    table.data td strong { color: #18181b; }

    .footer-rule  { border-top: 1px solid #e4e4e7; margin-top: 32px; padding-top: 16px; }
    .footer-left  { font-size: 11px; color: #d4d4d8; }
    .footer-right { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #d4d4d8; text-align: right; }

    @media only screen and (max-width: 640px) {
      .outer        { padding: 20px 12px !important; }
      .header-title { font-size: 18px !important; }
      table.data th,
      table.data td { padding: 6px 8px !important; font-size: 12px !important; }
    }

    @media (prefers-color-scheme: dark) {
      body                 { background-color: #111111 !important; color: #d4d4d4 !important; }
      .outer               { background-color: #111111 !important; }
      .header-org          { color: #666666 !important; }
      .header-title        { color: #f0f0f0 !important; }
      .header-meta         { color: #666666 !important; }
      .header-meta .sep    { color: #333333 !important; }
      .rule                { border-top-color: #222222 !important; }
      h2                   { color: #555555 !important; border-bottom-color: #1e1e1e !important; }
      h3                   { color: #e2e2e2 !important; }
      p                    { color: #aaaaaa !important; }
      li                   { color: #aaaaaa !important; }
      strong, b            { color: #e8e8e8 !important; }
      a                    { color: #10b981 !important; }
      code                 { background-color: #1c1c1c !important; color: #c4b5fd !important; }
      pre                  { background-color: #161616 !important; border-left-color: #333333 !important; color: #aaaaaa !important; }
      blockquote           { background-color: #1a1a1a !important; border-left-color: #333333 !important; }
      blockquote p         { color: #777777 !important; }
      table.data th        { color: #555555 !important; border-bottom-color: #222222 !important; }
      table.data td        { color: #aaaaaa !important; border-bottom-color: #1a1a1a !important; }
      table.data td strong { color: #e8e8e8 !important; }
      .badge-critical      { background-color: #3b0a0a !important; color: #f87171 !important; border-color: #7f1d1d !important; }
      .badge-warning       { background-color: #2d1a00 !important; color: #fbbf24 !important; border-color: #78350f !important; }
      .badge-watching      { background-color: #0c1a2e !important; color: #60a5fa !important; border-color: #1e3a5f !important; }
      .badge-clean         { background-color: #052e16 !important; color: #4ade80 !important; border-color: #14532d !important; }
      .footer-rule         { border-top-color: #1e1e1e !important; }
      .footer-left         { color: #444444 !important; }
      .footer-right        { color: #333333 !important; }
    }
  </style>
</head>
<body>
<div class="outer">
  <div class="inner" style="max-width:{{WIDTH}}">

    <div class="topbar"></div>

    <p class="header-org">Sentinel Analytics</p>
    <h1 class="header-title">{{SUBJECT}}</h1>
    <p class="header-meta">
      {{TIMESTAMP}}
      <span class="sep">|</span>
      <span class="badge {{PILL_CLASS}}">{{SEVERITY}}</span>
    </p>

    <hr class="rule">

    {{BODY}}

    <table class="footer-rule" width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td class="footer-left">Automated report &middot; Do not reply</td>
        <td class="footer-right">Sentinel</td>
      </tr>
    </table>

  </div>
</div>
</body>
</html>

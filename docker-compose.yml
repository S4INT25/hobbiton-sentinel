services:

  sentinel:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: sentinel
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # DigitalOcean Serverless Inference
      DigitalOcean__InferenceKey: ${DO_INFERENCE_KEY}
      DigitalOcean__InferenceEndpoint: ${DO_INFERENCE_ENDPOINT:-https://inference.do-ai.run/v1}
      DigitalOcean__ModelName: ${DO_MODEL_NAME:-llama3-3-70b-instruct}

      # PostgreSQL
      ConnectionStrings__Sentinel: Host=postgres;Database=sentinel;Username=sentinel;Password=${POSTGRES_PASSWORD}

      # ClickHouse
      ClickHouse__Host: ${CLICKHOUSE_HOST}
      ClickHouse__User: ${CLICKHOUSE_USER}
      ClickHouse__Password: ${CLICKHOUSE_PASSWORD}
      ClickHouse__MaxResultLength: ${CLICKHOUSE_MAX_RESULT_LENGTH:-10000}

      # Redis
      Redis__ConnectionString: redis:6379,password=${REDIS_PASSWORD},abortConnect=false

      # Email (Gmail SMTP)
      Email__From: ${EMAIL_FROM}
      Email__FromName: ${EMAIL_FROM_NAME:-Sentinel · Hobbiton}
      Email__To__0: ${EMAIL_TO}
      Email__SubjectPrefix: ${EMAIL_SUBJECT_PREFIX:-[SENTINEL]}
      Email__Smtp__Host: smtp.gmail.com
      Email__Smtp__Port: 587
      Email__Smtp__User: ${GMAIL_USER}
      Email__Smtp__Password: ${GMAIL_APP_PASSWORD}

      # Hangfire dashboard
      Dashboard__Username: ${DASHBOARD_USERNAME:-admin}
      Dashboard__Password: ${DASHBOARD_PASSWORD}

      # Sentinel tuning
      Sentinel__CronSchedule: ${CRON_SCHEDULE:-0 * * * *}
      Sentinel__LookbackMinutes: ${LOOKBACK_MINUTES:-70}
      Sentinel__MaxIterations: ${MAX_ITERATIONS:-60}
      Sentinel__StaleCase__ThresholdDays: ${STALE_CASE_THRESHOLD_DAYS:-7}

      # Seq structured logging
      Seq__Url: http://seq:5341
      Seq__ApiKey: ${SEQ_API_KEY:-}

    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://102.23.122.169:3100/loki/api/v1/push"
        loki-external-labels: "job=sentinel,env=prod"
        loki-batch-size: "400"

  postgres:
    image: postgres:18-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    ports:
      - "5450:5432"
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sentinel -d sentinel" ]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: sentinel-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5341:5341"   # ingest (app → Seq)
      - "127.0.0.1:5380:80"     # web UI
    volumes:
      - seq-data:/data

  redis:
    image: redis/redis-stack:latest
    container_name: sentinel-redis
    restart: unless-stopped
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  seq-data:
    driver: local

